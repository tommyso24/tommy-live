<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Tommy 的编程冒险日志 — 全部文章">
<title>冒险日志 — 全部文章 — Tommy.live</title>
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="blog-common.css">
<link rel="stylesheet" href="../assets/site-chrome.css">
</head>
<body class="has-site-chrome">
<div class="stars" id="stars"></div>
<div class="xp-bar"><div class="xp-bar-fill" id="xpBar"></div></div>
<nav>
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo"><span class="heart">♥</span> TOMMY.LIVE</a>
    <button type="button" class="menu-toggle" id="menuToggle" aria-label="菜单">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html#games" data-nav="games">游戏</a></li>
      <li><a href="../about/index.html" data-nav="about">关于</a></li>
      <li><a href="index.html" data-nav="blog">博客</a></li>
      <li><a href="../changelog/index.html" data-nav="changelog">更新日志</a></li>
    </ul>
  </div>
</nav>
<main>
  <h1 class="page-title">冒险日志</h1>
  <p class="page-sub">全部文章 · 按更新时间排序</p>
  <div class="blog-list" id="blogArchive" aria-live="polite"></div>
</main>
<script>
(function () {
  var c = document.getElementById('stars');
  for (var i = 0; i < 45; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--dur', (1.5 + Math.random() * 2.5) + 's');
    s.style.animationDelay = Math.random() * 2 + 's';
    c.appendChild(s);
  }
})();

(function () {
  var TAG_LABELS = { learning: '学习记录', thoughts: '碎碎念', tutorial: '教程' };
  var listEl = document.getElementById('blogArchive');

  function showError(msg) {
    listEl.innerHTML = '';
    var p = document.createElement('p');
    p.className = 'blog-feed-error';
    p.textContent = msg;
    listEl.appendChild(p);
  }

  fetch('posts.json')
    .then(function (r) {
      if (!r.ok) throw new Error('load');
      return r.json();
    })
    .then(function (posts) {
      if (!Array.isArray(posts) || posts.length === 0) {
        showError('暂无文章。');
        return;
      }
      posts.sort(function (a, b) {
        return new Date(b.updated) - new Date(a.updated);
      });
      listEl.innerHTML = '';
      posts.forEach(function (post) {
        var a = document.createElement('a');
        a.className = 'blog-item';
        a.href = post.slug + '/';

        var dateDiv = document.createElement('div');
        dateDiv.className = 'blog-date';
        var parts = post.date.split('-');
        dateDiv.appendChild(document.createTextNode(parts[0]));
        dateDiv.appendChild(document.createElement('br'));
        dateDiv.appendChild(document.createTextNode(parts[1] + '.' + parts[2]));

        var content = document.createElement('div');
        content.className = 'blog-content';
        var h3 = document.createElement('h3');
        h3.textContent = post.title;
        var p = document.createElement('p');
        p.textContent = post.excerpt;
        var tag = document.createElement('span');
        tag.className = 'blog-tag ' + post.tag;
        tag.textContent = TAG_LABELS[post.tag] || post.tag;
        content.appendChild(h3);
        content.appendChild(p);
        content.appendChild(tag);

        a.appendChild(dateDiv);
        a.appendChild(content);
        listEl.appendChild(a);
      });
    })
    .catch(function () {
      listEl.innerHTML = '';
      var p = document.createElement('p');
      p.className = 'blog-feed-error';
      p.textContent = '无法加载文章列表。请通过本地服务器或网站域名打开（勿用 file://）。';
      listEl.appendChild(p);
    });
})();
</script>
<script src="../assets/site-chrome.js"></script>
</body>
</html>
