    <h1>我为什么要学编程</h1>
    <p class="article-meta">发布于 2026-04-01 · <span class="blog-tag thoughts">碎碎念</span></p>
    <div class="article-body">
      <p>我想学编程，不是因为想马上换工作，而是觉得——能亲手做出<span class="highlight">好玩、有用</span>的东西，是一件很酷的事。</p>
      <p>我的目标挺具体的：从代码小白开始，一步步做出朋友们也愿意点开玩的小游戏、小工具。过程中肯定会卡壳、会搜一堆教程，但每解决一个小问题，就像游戏里过了一关。</p>
      <p>这个网站会记录我的冒险。如果你也在学，欢迎一起交流。</p>
    </div>
