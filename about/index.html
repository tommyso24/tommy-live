<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="你好！我是 Tommy，一个正在学习编程的冒险者。">
<title>关于我 — Tommy.live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../blog/blog-common.css">
<link rel="stylesheet" href="../assets/site-chrome.css">
<style>
.about-page {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px 64px;
}

.section-header {
  font-family: 'Press Start 2P', cursive;
  font-size: clamp(16px, 3vw, 22px);
  margin-bottom: 48px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.section-header .icon {
  font-size: 28px;
}

.section-header::after {
  content: '';
  flex: 1;
  height: 3px;
  background: repeating-linear-gradient(
    90deg,
    var(--border-color) 0,
    var(--border-color) 8px,
    transparent 8px,
    transparent 16px
  );
}

.about-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.about-text {
  font-size: 22px;
  line-height: 1.8;
}

.about-text p { margin-bottom: 16px; }

.about-text .highlight {
  color: var(--pixel-green);
  font-weight: bold;
}

.skill-tree {
  background: var(--bg-card);
  border: 3px solid var(--border-color);
  padding: 28px;
}

.skill-tree h3 {
  font-family: 'Press Start 2P', cursive;
  font-size: 15px;
  color: var(--pixel-purple);
  margin-bottom: 24px;
}

.skill-item {
  margin-bottom: 16px;
}

.skill-item .skill-name {
  font-size: 18px;
  color: var(--text-dim);
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
}

.skill-bar {
  height: 16px;
  background: var(--bg-dark);
  border: 2px solid var(--border-color);
  position: relative;
  overflow: hidden;
}

.skill-bar-fill {
  height: 100%;
  transition: width 1.5s ease-out;
  position: relative;
}

.skill-bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent 0,
    transparent 6px,
    rgba(0,0,0,0.2) 6px,
    rgba(0,0,0,0.2) 8px
  );
}

.skill-bar-fill.html { width: 40%; background: var(--pixel-orange); }
.skill-bar-fill.css { width: 30%; background: var(--pixel-blue); }
.skill-bar-fill.js { width: 20%; background: var(--pixel-yellow); }
.skill-bar-fill.enthusiasm { width: 100%; background: var(--pixel-green); }

@media (max-width: 768px) {
  .about-container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body class="has-site-chrome">
<div class="stars" id="stars"></div>
<div class="xp-bar"><div class="xp-bar-fill" id="xpBar"></div></div>
<nav>
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo"><span class="heart">♥</span> TOMMY.LIVE</a>
    <button type="button" class="menu-toggle" id="menuToggle" aria-label="菜单">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html#games" data-nav="games">游戏</a></li>
      <li><a href="index.html" data-nav="about">关于</a></li>
      <li><a href="../blog/index.html" data-nav="blog">博客</a></li>
      <li><a href="../changelog/index.html" data-nav="changelog">更新日志</a></li>
    </ul>
  </div>
</nav>
<main class="about-page">
  <h2 class="section-header fade-in">
    <span class="icon">👾</span> 关于我
  </h2>

  <div class="about-container">
    <div class="about-text fade-in">
      <p>
        你好！我是 <span class="highlight">Tommy</span>，一个正在学习编程的冒险者。
      </p>
      <p>
        我相信学编程最好的方式就是<span class="highlight">做出好玩的东西</span>。
        所以我决定用 Claude Code 辅助开发，一边做小工具和游戏，一边提升自己的代码能力。
      </p>
      <p>
        这个网站记录了我从零开始的编程冒险旅程。
        每完成一个项目，我的等级就会提升一级。
        目标是做出让朋友们都爱玩的东西！
      </p>
      <p>
        📍 新加坡 &nbsp;|&nbsp; 🎯 目标：全栈开发者
      </p>
    </div>

    <div class="skill-tree fade-in">
      <h3>⚔️ 技能树</h3>

      <div class="skill-item">
        <div class="skill-name">
          <span>HTML</span>
          <span style="color:var(--pixel-orange)">学徒</span>
        </div>
        <div class="skill-bar">
          <div class="skill-bar-fill html"></div>
        </div>
      </div>

      <div class="skill-item">
        <div class="skill-name">
          <span>CSS</span>
          <span style="color:var(--pixel-blue)">见习</span>
        </div>
        <div class="skill-bar">
          <div class="skill-bar-fill css"></div>
        </div>
      </div>

      <div class="skill-item">
        <div class="skill-name">
          <span>JavaScript</span>
          <span style="color:var(--pixel-yellow)">入门</span>
        </div>
        <div class="skill-bar">
          <div class="skill-bar-fill js"></div>
        </div>
      </div>

      <div class="skill-item">
        <div class="skill-name">
          <span>学习热情</span>
          <span style="color:var(--pixel-green)">MAX!!</span>
        </div>
        <div class="skill-bar">
          <div class="skill-bar-fill enthusiasm"></div>
        </div>
      </div>
    </div>
  </div>
</main>
<script>
(function () {
  var c = document.getElementById('stars');
  for (var i = 0; i < 45; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--dur', (1.5 + Math.random() * 2.5) + 's');
    s.style.animationDelay = Math.random() * 2 + 's';
    c.appendChild(s);
  }
})();
</script>
<script src="../assets/site-chrome.js"></script>
</body>
</html>
